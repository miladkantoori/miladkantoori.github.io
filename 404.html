<!DOCTYPE html>
<html lang="fa">
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta name="theme-color" content="#0a0a12">
	<title>صفحه مورد نظر پیدا نشد - Milad Kantoori</title>
	<link type="text/css" href="Theme/css/404.css" rel="stylesheet" />
	<style>
		body { background: #08080f; background-image: radial-gradient(ellipse at 20% 50%, rgba(233,139,44,0.08) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(124,92,252,0.05) 0%, transparent 50%); }
		.btn-go-home { border-color: #e98b2c; color: #e98b2c; }
		.btn-go-home:hover { background: #e98b2c; color: #fff; }
		.stars { background-image: radial-gradient(2px 2px at 20px 30px, #eee, transparent), radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent), radial-gradient(2px 2px at 50px 160px, #ddd, transparent), radial-gradient(2px 2px at 90px 40px, rgba(255,255,255,0.6), transparent), radial-gradient(2px 2px at 130px 80px, #fff, transparent), radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.7), transparent); background-size: 200px 200px; }
	</style>
</head>
<body>
	<div class="stars">
		<div class="central-body">
			<img class="image-404" src="Theme/img/404.png" width="300px" alt="404">
			<a href="./" class="btn-go-home">بازگشت به صفحه اصلی</a>
		</div>
		<div class="objects">
			<img class="object_rocket" src="Theme/img/rocket.svg" width="40px" alt="">
			<div class="earth-moon">
				<img class="object_earth" src="Theme/img/earth.svg" width="100px" alt="">
				<img class="object_moon" src="Theme/img/moon.svg" width="80px" alt="">
			</div>
			<div class="box_astronaut">
				<img class="object_astronaut" src="Theme/img/astronaut.svg" width="140px" alt="">
			</div>
		</div>
		<div class="glowing_stars">
			<div class="star"></div>
			<div class="star"></div>
			<div class="star"></div>
			<div class="star"></div>
			<div class="star"></div>
		</div>
	</div>
</body>
</html>
